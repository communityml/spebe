<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #fef9e7;
    background-image: radial-gradient(circle at 20% 20%, #fff3b0 0%, transparent 50%),
                      radial-gradient(circle at 80% 80%, #ffe082 0%, transparent 50%);
    font-family: 'Nunito', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 20px;
    gap: 24px;
  }

  .hive {
    background: white;
    border-radius: 32px;
    padding: 48px 40px;
    max-width: 520px;
    width: 100%;
    box-shadow: 0 8px 40px rgba(255,179,0,0.25), 0 2px 8px rgba(0,0,0,0.06);
    border: 3px solid #ffd54f;
    text-align: center;
  }

  .hex-icon {
    font-size: 64px;
    line-height: 1;
    margin-bottom: 8px;
    display: block;
    animation: bob 2s ease-in-out infinite;
  }

  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 2.4rem;
    color: #e65100;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .subtitle {
    color: #9e6b00;
    font-size: 0.95rem;
    margin-bottom: 32px;
    font-weight: 600;
  }

  .round-badge {
    display: inline-block;
    background: #fff8e1;
    border: 2px solid #ffd54f;
    color: #e65100;
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    padding: 4px 18px;
    border-radius: 20px;
    margin-bottom: 24px;
  }

  .status-box {
    background: #fff8e1;
    border-radius: 20px;
    padding: 20px 24px;
    min-height: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 24px;
    border: 2px dashed #ffd54f;
    transition: all 0.3s ease;
  }

  .status-box p {
    font-size: 1.05rem;
    color: #5d4037;
    font-weight: 600;
    line-height: 1.5;
  }

  .voice-indicator {
    display: none;
    align-items: center;
    gap: 8px;
    color: #e65100;
    font-weight: 700;
    font-size: 1rem;
  }

  .voice-indicator.active { display: flex; }

  .bars { display: flex; gap: 3px; align-items: flex-end; height: 24px; }

  .bar {
    width: 4px;
    background: #ffa726;
    border-radius: 2px;
    animation: wave 0.8s ease-in-out infinite;
  }
  .bar:nth-child(2) { animation-delay: 0.1s; }
  .bar:nth-child(3) { animation-delay: 0.2s; }
  .bar:nth-child(4) { animation-delay: 0.1s; }

  @keyframes wave {
    0%, 100% { height: 6px; }
    50% { height: 22px; }
  }

  .input-row { display: flex; gap: 10px; margin-bottom: 16px; }

  input[type="text"] {
    flex: 1;
    padding: 14px 20px;
    font-size: 1.2rem;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    border: 3px solid #ffd54f;
    border-radius: 16px;
    outline: none;
    background: #fffde7;
    color: #3e2723;
    letter-spacing: 2px;
    transition: border-color 0.2s;
    text-transform: lowercase;
  }

  input[type="text"]:focus { border-color: #ffa726; }
  input[type="text"]:disabled { opacity: 0.5; cursor: not-allowed; }

  button {
    padding: 14px 24px;
    background: #ffa726;
    color: white;
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    border: none;
    border-radius: 16px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 0.5px;
  }

  button:hover:not(:disabled) { background: #fb8c00; transform: translateY(-1px); }
  button:active:not(:disabled) { transform: translateY(1px); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .result {
    font-family: 'Fredoka One', cursive;
    font-size: 1.5rem;
    padding: 14px;
    border-radius: 16px;
    margin-bottom: 16px;
    display: none;
    animation: pop 0.3s ease;
  }

  @keyframes pop {
    0% { transform: scale(0.8); opacity: 0; }
    60% { transform: scale(1.05); }
    100% { transform: scale(1); opacity: 1; }
  }

  .result.correct { background: #e8f5e9; color: #2e7d32; border: 2px solid #a5d6a7; display: block; }
  .result.wrong   { background: #fce4ec; color: #c62828; border: 2px solid #ef9a9a; display: block; }

  .repeat-btn {
    background: #fff8e1;
    color: #e65100;
    border: 2px solid #ffd54f;
    width: 100%;
    font-size: 1rem;
    padding: 10px;
    margin-bottom: 8px;
  }
  .repeat-btn:hover:not(:disabled) { background: #fff3cd; }

  .pause-btn {
    background: #f3f4f6;

    border: 2px solid #d1d5db;

    padding: 10px;
    margin-bottom: 8px;
  }
  .pause-btn:hover:not(:disabled) { background: #e5e7eb; }
  .pause-btn.paused {
    background: #fef3c7;
    color: #92400e;
    border-color: #fcd34d;
  }
  .pause-btn.paused:hover:not(:disabled) { background: #fde68a; }

  .score-row {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-top: 24px;
    padding-top: 20px;
    border-top: 2px solid #fff3e0;
  }

  .score-item { text-align: center; }
  .score-num { font-family: 'Fredoka One', cursive; font-size: 1.8rem; color: #e65100; line-height: 1; }
  .score-label { font-size: 0.8rem; color: #9e6b00; font-weight: 600; }

  .word-counts {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid #fff3e0;
    font-size: 0.8rem;
    color: #bbb;
    font-weight: 600;
    line-height: 1.9;
    letter-spacing: 0.2px;
  }

  .start-btn { width: 100%; padding: 18px; font-size: 1.3rem; background: #ffa726; border-radius: 20px; margin-top: 8px; }

  .correct-word {
    display: block;
    font-family: 'Fredoka One', cursive;
    font-size: 2.2rem;
    letter-spacing: 4px;
    margin: 8px 0 6px;
    line-height: 1.2;
  }

  .result-label { display: block; font-size: 1rem; opacity: 0.85; margin-bottom: 2px; }

  .level-tag {
    display: inline-block;
    font-family: 'Fredoka One', cursive;
    font-size: 0.85rem;
    padding: 3px 14px;
    border-radius: 20px;
    margin-top: 6px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .level-a { background: #c8e6c9; color: #1b5e20; }
  .level-b { background: #fff9c4; color: #f57f17; }
  .level-c { background: #fce4ec; color: #880e4f; }
  .level-d { background: #ede7f6; color: #4a148c; }

  /* ── History Panel ── */
  .history-panel {
    max-width: 520px;
    width: 100%;
    background: white;
    border-radius: 32px;
    padding: 28px 32px;
    box-shadow: 0 8px 40px rgba(255,179,0,0.15), 0 2px 8px rgba(0,0,0,0.04);
    border: 3px solid #ffd54f;
  }

  .history-title {
    font-family: 'Fredoka One', cursive;
    font-size: 1.3rem;
    color: #e65100;
    text-align: center;
    margin-bottom: 4px;
  }

  .history-hint {
    font-size: 0.78rem;
    color: #bbb;
    text-align: center;
    margin-bottom: 16px;
    font-weight: 600;
  }

  .history-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  .history-col h3 {
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 2px solid;
    text-align: center;
  }

  .history-col.wrong-col h3 { color: #b45309; border-color: #fcd34d; }
  .history-col.right-col h3 { color: #2e7d32; border-color: #a5d6a7; }

  .history-list {
    max-height: 280px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .history-list::-webkit-scrollbar { width: 4px; }
  .history-list::-webkit-scrollbar-thumb { background: #ffd54f; border-radius: 4px; }

  .history-word {
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    padding: 5px 10px;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.15s;
    text-align: center;
    letter-spacing: 0.5px;
    border: none;
  }

  .wrong-col .history-word { background: #fffbeb; color: #92400e; border: 1px solid #fcd34d; }
  .right-col .history-word { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
  .history-word:hover { transform: scale(1.06); opacity: 0.8; background: inherit; }

  .history-empty { font-size: 0.8rem; color: #ccc; text-align: center; padding: 12px 0; font-style: italic; }

  .voice-select-row {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 6px;
    margin-bottom: 12px;
    font-size: 0.75rem;
    color: #bbb;
  }

  .voice-select-row select {
    font-family: 'Nunito', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    color: #9e6b00;
    background: #fff8e1;
    border: 2px solid #ffd54f;
    border-radius: 10px;
    padding: 3px 8px;
    cursor: pointer;
    outline: none;
    max-width: 200px;
  }

  .voice-select-row select:focus { border-color: #ffa726; }

  .rate-slider-row {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 8px;
    margin-bottom: 12px;
    font-size: 0.85rem;
  }

  .rate-slider-row input[type=range] {
    -webkit-appearance: none;
    width: 110px;
    height: 6px;
    border-radius: 4px;
    background: linear-gradient(to right, #ffd54f, #ffa726);
    outline: none;
    cursor: pointer;
  }

  .rate-slider-row input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: #ffa726;
    border: 2px solid white;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    cursor: pointer;
  }


</style>

<body>

<div class="hive">

  <div class="voice-select-row">
    🔊 <select id="voiceSelect"><option value="">Default voice</option></select>
  </div>
  <div class="rate-slider-row">
    🐢 <input type="range" id="rateSlider" min="0.5" max="1.1" step="0.05" value="0.9"> 🐇
  </div>
  <span class="hex-icon">🐝</span>
  <h1>Spelling Bee</h1>
  <p class="subtitle">Listen carefully and spell the word!</p>

  <div id="roundBadge" class="round-badge" style="display:none">Round <span id="roundNum">1</span></div>

  <div class="status-box" id="statusBox">
    <div class="voice-indicator" id="voiceIndicator">
      <div class="bars">
        <div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div>
      </div>
      Speaking...
    </div>
    <p id="statusText">Press Start to begin your spelling bee!</p>
  </div>

  <div class="input-row">
    <input type="text" id="spellingInput" placeholder="type your spelling..." disabled
           autocomplete="off" autocorrect="off" spellcheck="false" />
    <button id="submitBtn" onclick="checkSpelling()" disabled>✓</button>
  </div>

  <div class="result" id="resultBox"></div>

  <button class="repeat-btn" id="repeatBtn" onclick="repeatWord()" style="display:none">🔁 Repeat</button>
  <button class="pause-btn" id="pauseBtn" onclick="togglePause()" style="display:none">⏸ Pause</button>

  <button class="start-btn" id="startBtn" onclick="startGame()">Start Game 🍯</button>

  <div class="score-row">
    <div class="score-item">
      <div class="score-num" id="scoreCorrect">0</div>
      <div class="score-label">Correct</div>
    </div>
    <div class="score-item">
      <div class="score-num" id="scoreTotal">0</div>
      <div class="score-label">Total</div>
    </div>
  </div>

  <div class="word-counts" id="wordCounts"></div>
</div>

<!-- History Panel -->
<div class="history-panel" id="historyPanel" style="display:none">
  <div class="history-title">📋 Word History</div>
  <div class="history-hint">click any word to practice it again</div>
  <div class="history-cols">
    <div class="history-col wrong-col">
      <h3>⚠️ Needs Practice</h3>
      <div class="history-list" id="wrongList"></div>
    </div>
    <div class="history-col right-col">
      <h3>✅ Correct</h3>
      <div class="history-list" id="rightList"></div>
    </div>
  </div>
</div>

<script>
// ── Word Lists (loaded from backend on init) ──────────────────────────────────
let WORD_LISTS = { a: [], b: [], c: [], d: [] };
const LEVEL_ORDER  = ["a", "b", "c", "d"];
const LEVEL_LABELS = { a: "A Level", b: "B Level", c: "C Level", d: "D Level" };
const MAX_HISTORY  = 50;
const KEY_WRONG    = "spellingbee_wrong";
const KEY_RIGHT    = "spellingbee_right";

// ── State ─────────────────────────────────────────────────────────────────────
let currentWord      = "";
let currentLevel     = "a";
let round            = 0;
let correct          = 0;
let total            = 0;
let isSpeaking       = false;
let lastSpokenText   = "";
let speakResolve     = null;
let streak           = 0;
let targetedWord     = null;   // word clicked from history
let levelBeforeTarget = null;  // restore after targeted round
let isPaused         = false;

// ── DOM refs ──────────────────────────────────────────────────────────────────
const statusText    = document.getElementById("statusText");
const voiceIndicator= document.getElementById("voiceIndicator");
const spellingInput = document.getElementById("spellingInput");
const submitBtn     = document.getElementById("submitBtn");
const resultBox     = document.getElementById("resultBox");
const repeatBtn     = document.getElementById("repeatBtn");
const startBtn      = document.getElementById("startBtn");
const roundBadge    = document.getElementById("roundBadge");
const roundNum      = document.getElementById("roundNum");
const pauseBtn      = document.getElementById("pauseBtn");
const historyPanel  = document.getElementById("historyPanel");
const wrongList     = document.getElementById("wrongList");
const rightList     = document.getElementById("rightList");

// ── localStorage helpers ──────────────────────────────────────────────────────
function loadHistory(key) {
  try { return JSON.parse(localStorage.getItem(key) || "[]"); } catch { return []; }
}
function saveHistory(key, arr) {
  try { localStorage.setItem(key, JSON.stringify(arr)); } catch {}
}
function addToHistory(key, word) {
  let arr = loadHistory(key);
  arr.unshift(word);
  if (arr.length > MAX_HISTORY) arr = arr.slice(0, MAX_HISTORY);
  saveHistory(key, arr);
}

// ── Render history ────────────────────────────────────────────────────────────
function renderHistory() {
  const wrong = loadHistory(KEY_WRONG);
  const right = loadHistory(KEY_RIGHT);
  historyPanel.style.display = (wrong.length || right.length) ? "block" : "none";

  wrongList.innerHTML = wrong.length
    ? wrong.map(w => `<button class="history-word" onclick="playTargetedWord('${w}')">${w}</button>`).join("")
    : `<div class="history-empty">none yet</div>`;

  rightList.innerHTML = right.length
    ? right.map(w => `<button class="history-word" onclick="playTargetedWord('${w}')">${w}</button>`).join("")
    : `<div class="history-empty">none yet</div>`;
}

// ── Targeted word ─────────────────────────────────────────────────────────────
function playTargetedWord(word) {
  // Interrupt if currently speaking
  if (isSpeaking) {
    window.speechSynthesis && window.speechSynthesis.cancel();
    isSpeaking = false;
    if (speakResolve) { speakResolve(); speakResolve = null; }
  }
  levelBeforeTarget = currentLevel;
  targetedWord = word;
  nextRound();
}

// ── Input / interrupt ─────────────────────────────────────────────────────────
spellingInput.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    if (!submitBtn.disabled) {
      checkSpelling();
    } else if (isSpeaking && spellingInput.value.trim()) {
      interruptAndCheck();
    }
  }
});

function interruptAndCheck() {
  window.speechSynthesis && window.speechSynthesis.cancel();
  isSpeaking = false;
  if (speakResolve) { speakResolve(); speakResolve = null; }
  submitBtn.disabled = false;
  spellingInput.disabled = false;
  checkSpelling();
}

// ── Pause ─────────────────────────────────────────────────────────────────────
function togglePause() {
  isPaused = !isPaused;
  if (isPaused) {
    pauseBtn.textContent = "▶ Resume";
    pauseBtn.classList.add("paused");
    if (isSpeaking) {
      window.speechSynthesis && window.speechSynthesis.pause();
    }
  } else {
    pauseBtn.textContent = "⏸ Pause";
    pauseBtn.classList.remove("paused");
    if (isSpeaking) {
      window.speechSynthesis && window.speechSynthesis.resume();
    }
    // If we were waiting between rounds (not speaking, not input active),
    // kick off the next round manually — handled by resumeAfterPause
  }
}

// ── Game flow ─────────────────────────────────────────────────────────────────
// Normalise a spelling for comparison: lowercase, strip spaces/hyphens/accents
function normalizeSpelling(s) {
  return s.toLowerCase()
    .replace(/[-\s]/g, '')
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '');
}

// Get display string from an entry (string or {display, alts} object)
function entryDisplay(entry) {
  return typeof entry === 'string' ? entry : entry.display;
}

// Get all accepted normalized spellings from an entry
function entryAlts(entry) {
  if (typeof entry === 'string') return [normalizeSpelling(entry)];
  return entry.alts.map(normalizeSpelling);
}

function pickWord(level) {
  const pool = WORD_LISTS[level].filter(e => entryDisplay(e) !== currentWord);
  const entry = pool[Math.floor(Math.random() * pool.length)];
  return entryDisplay(entry);
}

// Given a display string, find the entry object in any level
function findEntry(display) {
  for (const level of LEVEL_ORDER) {
    const e = WORD_LISTS[level].find(e => entryDisplay(e) === display);
    if (e !== undefined) return e;
  }
  return display; // fallback: treat as plain string
}

function changeLevel(wasCorrect) {
  const idx = LEVEL_ORDER.indexOf(currentLevel);
  currentLevel = wasCorrect
    ? LEVEL_ORDER[Math.min(idx + 1, LEVEL_ORDER.length - 1)]
    : LEVEL_ORDER[Math.max(idx - 1, 0)];
}

async function startGame() {
  startBtn.disabled = true;
  startBtn.textContent = "Loading words...";

  try {
    const resp = await fetch(`${PROXY_BASE}/wordlists`);
    if (!resp.ok) throw new Error("Failed to load word lists");
    WORD_LISTS = await resp.json();
    // Update word count display now that lists are loaded
    updateWordCounts();
  } catch(e) {
    startBtn.disabled = false;
    startBtn.textContent = "Start Game 🍯";
    alert("Could not connect to the spelling bee server. Please try again.");
    return;
  }

  startBtn.style.display = "none";
  pauseBtn.style.display = "block";
  roundBadge.style.display = "inline-block";
  currentLevel = "a";
  renderHistory();
  nextRound();
}

// ── API helpers (talk to secure backend endpoints) ───────────────────────────
const PROXY_BASE = "https://spebe.onrender.com";

async function wordApi(endpoint, word) {
  const response = await fetch(`${PROXY_BASE}/word/${endpoint}`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ word })
  });
  const data = await response.json();
  if (!response.ok) throw new Error(data.error || response.status);
  return data.text || "";
}

// ── Speed Run nextRound ───────────────────────────────────────────────────────
// roundId increments each round — async callbacks check if they're still current
let roundId = 0;

async function nextRound() {
  round++;
  roundNum.textContent = round;
  const myRoundId = ++roundId; // capture this round's ID

  if (targetedWord) {
    currentWord = targetedWord;
    targetedWord = null;
  } else {
    currentWord = pickWord(currentLevel);
  }

  resultBox.className = "result";
  resultBox.innerHTML = "";
  spellingInput.value = "";
  spellingInput.disabled = false;
  submitBtn.disabled = true;
  spellingInput.placeholder = "start typing while I talk...";
  spellingInput.focus();
  repeatBtn.style.display = "none";

  // Helper: returns true if this round has been superseded (user submitted or new round started)
  const stale = () => roundId !== myRoundId;

  // ── Step 1: Say the word twice (normal + slow), input locked until after first ─
  const wordAnnouncement = `${primarySpelling(currentWord)}.`;
  lastSpokenText = wordAnnouncement;
  setStatus("", false);
  statusText.style.display = "none";
  spellingInput.disabled = true;
  submitBtn.disabled = true;

  await waitIfPaused();
  await speakText(primarySpelling(currentWord) + ".", 0.92);

  // NOW unlock input — they can start typing after hearing it once
  spellingInput.disabled = false;
  submitBtn.disabled = false;
  spellingInput.placeholder = "type your spelling...";
  spellingInput.focus();

  // Longer pause then say it slower — bail if already submitted
  await new Promise(r => setTimeout(r, 900));
  if (!stale()) await speakText(primarySpelling(currentWord) + ".", getRate() * 0.65);

  // ── Step 2: Fetch & speak definition ─────────────────────────────────────
  if (stale()) return;
  setStatus("Getting definition...", false);
  let definitionText = "";
  try {
    definitionText = await wordApi("definition", currentWord);
  } catch(e) { /* silently skip if fails */ }

  if (stale()) return;
  if (definitionText) {
    lastSpokenText = wordAnnouncement + " " + definitionText;
    await waitIfPaused();
    await speakText(definitionText);
  }

  // ── Step 3: Fetch & speak example sentence ───────────────────────────────
  if (stale()) return;
  setStatus("Getting example...", false);
  let exampleText = "";
  try {
    exampleText = await wordApi("example", currentWord);
  } catch(e) { /* silently skip if fails */ }

  if (stale()) return;
  if (exampleText) {
    lastSpokenText = wordAnnouncement + " " + definitionText + " " + exampleText + " Please spell: " + primarySpelling(currentWord) + ".";
    await waitIfPaused();
    await speakText(exampleText);
  }

  // ── Final prompt ─────────────────────────────────────────────────────────
  await waitIfPaused();
  await speakText(`Please spell: ${primarySpelling(currentWord)}.`);
  if (spellingInput.disabled) return;

  repeatBtn.style.display = "block";
  setStatus("Type your spelling above and press ✓ or Enter", false);
}

async function waitIfPaused() {
  if (!isPaused) return;
  setStatus("Paused — press Resume to continue", false);
  await new Promise(r => {
    const check = setInterval(() => { if (!isPaused) { clearInterval(check); r(); } }, 200);
  });
}

function setStatus(text, isVoice) {
  statusText.textContent = text;
  statusText.style.display = isVoice ? "none" : "block";
  voiceIndicator.className = "voice-indicator" + (isVoice ? " active" : "");
}

function getChosenVoice() {
  const voices = window.speechSynthesis.getVoices();
  const selectedName = document.getElementById("voiceSelect")?.value;
  let v = selectedName ? voices.find(v => v.name === selectedName) : null;
  if (!v) v = voices.find(v =>
    v.name.includes("Samantha") || v.name.includes("Karen") ||
    v.name.includes("Google US") || v.name.includes("en-US")
  );
  return v || null;
}

function getRate(override) {
  if (override !== undefined) return override;
  const slider = document.getElementById("rateSlider");
  return slider ? parseFloat(slider.value) : 0.9;
}

// Speak a superlative with snarky energy: pause, fast+high, pause
async function speakSuperlative(text) {
  await new Promise(r => setTimeout(r, 220)); // brief mic-drop lead-in silence
  await new Promise(resolve => {
    if (!window.speechSynthesis) { resolve(); return; }
    window.speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.rate  = Math.min(getRate() * 1.25, 1.4); // punchy — faster than normal
    utt.pitch = 1.35;                              // higher — ta-da energy
    const voice = getChosenVoice();
    if (voice) utt.voice = voice;
    utt.onend  = resolve;
    utt.onerror = resolve;
    window.speechSynthesis.speak(utt);
  });
  await new Promise(r => setTimeout(r, 350)); // mic drop silence after
}

// For alternate spelling entries like "marvelous / marvellous", return just the first
function primarySpelling(word) {
  return word.split('/')[0].trim();
}

function speakText(text, rateOverride) {
  return new Promise(resolve => {
    if (!window.speechSynthesis) { resolve(); return; }
    window.speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.rate = getRate(rateOverride);
    utt.pitch = 1.05;
    const voice = getChosenVoice();
    if (voice) utt.voice = voice;
    isSpeaking = true;
    speakResolve = resolve;
    lastSpokenText = text;
    setStatus("", true);
    utt.onend  = () => { isSpeaking = false; speakResolve = null; resolve(); };
    utt.onerror= () => { isSpeaking = false; speakResolve = null; resolve(); };
    window.speechSynthesis.speak(utt);
  });
}

// Speak a word twice: slider speed, longer pause, then slower
async function speakWordTwice(word) {
  await speakText(word + ".");
  await new Promise(r => setTimeout(r, 900));
  await speakText(word + ".", getRate() * 0.65);
}

function repeatWord() {
  if (isSpeaking) return;
  repeatBtn.style.display = "none";
  speakText(lastSpokenText).then(() => {
    repeatBtn.style.display = "block";
    setStatus("Type your spelling above and press ✓ or Enter", false);
  });
}

// ── Confetti burst on streak ──────────────────────────────────────────────────
function launchConfetti() {
  const canvas = document.createElement("canvas");
  canvas.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999";
  document.body.appendChild(canvas);
  const ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const colors = ["#ffd54f","#ffa726","#ff7043","#66bb6a","#42a5f5","#ab47bc","#ef5350","#26c6da"];
  const pieces = Array.from({length: 120}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * -canvas.height * 0.5,
    w: 8 + Math.random() * 8,
    h: 5 + Math.random() * 5,
    color: colors[Math.floor(Math.random() * colors.length)],
    angle: Math.random() * Math.PI * 2,
    spin: (Math.random() - 0.5) * 0.2,
    vx: (Math.random() - 0.5) * 4,
    vy: 2 + Math.random() * 4,
    alpha: 1,
  }));

  let frame;
  const tick = () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    for (const p of pieces) {
      p.x += p.vx; p.y += p.vy; p.angle += p.spin;
      if (p.y > canvas.height * 0.7) p.alpha -= 0.025;
      if (p.alpha > 0) alive = true;
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.alpha);
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    }
    if (alive) frame = requestAnimationFrame(tick);
    else canvas.remove();
  };
  frame = requestAnimationFrame(tick);
}

async function checkSpelling() {
  const guess = spellingInput.value.trim().toLowerCase();
  if (!guess || spellingInput.disabled) return;

  roundId++; // invalidate any in-flight definition/example fetches for this round
  spellingInput.disabled = true;
  submitBtn.disabled = true;
  total++;

  const entry = findEntry(currentWord);
  const normGuess = normalizeSpelling(guess);
  const isCorrect = entryAlts(entry).includes(normGuess);
  if (isCorrect) { correct++; streak++; } else { streak = 0; }

  document.getElementById("scoreCorrect").textContent = correct;
  document.getElementById("scoreTotal").textContent = total;

  // Record to history
  addToHistory(isCorrect ? KEY_RIGHT : KEY_WRONG, currentWord);
  renderHistory();

  const levelAtAnswer = currentLevel;

  // After a targeted round restore saved level; normal rounds adapt
  if (levelBeforeTarget !== null) {
    currentLevel = levelBeforeTarget;
    levelBeforeTarget = null;
  } else {
    changeLevel(isCorrect);
  }

  const levelClass    = "level-" + levelAtAnswer;
  const nextLevelLabel = LEVEL_LABELS[currentLevel];

  if (isCorrect) {
    resultBox.className = "result correct";
    resultBox.innerHTML = `
      <span class="result-label">✅ Correct! Well done!</span>
      <span class="correct-word">${currentWord}</span>
      <span class="level-tag ${levelClass}">${LEVEL_LABELS[levelAtAnswer]}</span>
      <span style="display:block;font-size:0.85rem;margin-top:8px;opacity:0.7">Next up: ${nextLevelLabel}</span>`;
    if (streak >= 3) launchConfetti();
    await speakText("Correct.");
    await speakSuperlative(randomSuperlative());
  } else {
    resultBox.className = "result wrong";
    resultBox.innerHTML = `
      <span class="result-label">❌ Not quite. The correct spelling is:</span>
      <span class="correct-word">${currentWord}</span>
      <span class="level-tag ${levelClass}">${LEVEL_LABELS[levelAtAnswer]}</span>
      <span style="display:block;font-size:0.85rem;margin-top:8px;opacity:0.7">Next up: ${nextLevelLabel}</span>`;
    await speakText(`Not quite. The correct spelling is ${currentWord.split("").join(" ")}.`);
    await speakText(primarySpelling(currentWord) + ".");
  }

  setStatus("", false);
  statusText.style.display = "none";
  repeatBtn.style.display = "none";
  // Pause-aware delay before auto-advancing
  await new Promise(r => {
    let elapsed = 0;
    const tick = setInterval(() => {
      if (!isPaused) elapsed += 100;
      if (elapsed >= 1800) { clearInterval(tick); r(); }
    }, 100);
  });
  if (!isPaused) {
    nextRound();
  } else {
    // Wait for resume then go
    await new Promise(r => {
      const check = setInterval(() => {
        if (!isPaused) { clearInterval(check); r(); }
      }, 200);
    });
    nextRound();
  }
}

// ── Preload & populate voice selector ────────────────────────────────────────
function populateVoiceList() {
  const voices = window.speechSynthesis.getVoices();
  const sel = document.getElementById("voiceSelect");
  if (!sel || voices.length === 0) return;
  const current = sel.value;
  // Only show English voices
  const engVoices = voices.filter(v => v.lang.startsWith("en"));
  sel.innerHTML = '<option value="">Default voice</option>' +
    engVoices.map(v => `<option value="${v.name}"${v.name === current ? " selected" : ""}>${v.name} (${v.lang})</option>`).join("");
}

if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = populateVoiceList;
  populateVoiceList();
}

// Show any saved history on load
renderHistory();

// Word counts (called after word lists load)
function updateWordCounts() {
  const counts = document.getElementById("wordCounts");
  if (!counts) return;
  const lines = LEVEL_ORDER.map(l => {
    const n = (WORD_LISTS[l] || []).length;
    return n > 0 ? `${LEVEL_LABELS[l]} Words: ${n}` : `${LEVEL_LABELS[l]} Words: —`;
  });
  counts.innerHTML = lines.join("<br>");
}
updateWordCounts();
