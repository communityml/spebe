// ── ROT13 (used for ?w= custom word list encoding) ────────────────────────────
function rot13(s) {
  return s.replace(/[a-zA-Z]/g, c => {
    const b = c <= 'Z' ? 65 : 97;
    return String.fromCharCode(((c.charCodeAt(0) - b + 13) % 26) + b);
  });
}

// ── Custom word list from URL ?w= param ───────────────────────────────────────
let customWords = null;
(function() {
  try {
    const p = new URLSearchParams(window.location.search).get('w');
    if (p) {
      const words = rot13(decodeURIComponent(p)).split('|').map(w => w.trim()).filter(w => w.length > 0);
      if (words.length > 0) customWords = words;
    }
  } catch {}
})();

// ── Mode switcher ─────────────────────────────────────────────────────────────
function setMode(mode) {
  gameMode = mode;
  document.querySelectorAll('.mode-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('mode-' + mode).classList.add('active');
  const banner = document.getElementById('customBanner');
  const customLink = document.getElementById('customListLink');
  if (mode === 'custom') {
    banner.style.display = 'block';
    customLink.style.display = 'block';
  } else {
    banner.style.display = 'none';
    customLink.style.display = 'none';
  }
}

// ── localStorage helpers ──────────────────────────────────────────────────────
function loadHistory(key) {
  try { return JSON.parse(localStorage.getItem(key) || "[]"); } catch { return []; }
}
function saveHistory(key, arr) {
  try { localStorage.setItem(key, JSON.stringify(arr)); } catch {}
}
function addToHistory(key, word) {
  let arr = loadHistory(key);
  arr.unshift(word);
  if (arr.length > MAX_HISTORY) arr = arr.slice(0, MAX_HISTORY);
  saveHistory(key, arr);
}

// ── Signing (tongue-in-cheek integrity — you'd have to read the JS to cheat) ─
const SIGN_KEY = "beekeeper_extraordinaire";
function djb2(str) {
  let h = 5381;
  for (let i = 0; i < str.length; i++) h = (Math.imul(31, h) + str.charCodeAt(i)) | 0;
  return (h >>> 0).toString(16);
}
function signPayload(data) {
  const canonical = JSON.stringify(data, Object.keys(data).sort());
  return djb2(SIGN_KEY + canonical + SIGN_KEY);
}

// ── Lifetime score ────────────────────────────────────────────────────────────
// Points per word: ceil(n² / 10) * 10  →  1-3=10, 4=20, 5=30, 6=40, 7=50,
//                                          8=70, 9=90, 10=100, 11=130, 12=150 …
function wordScore(n) {
  return Math.ceil(n * n / 10) * 10;
}
function loadLifetimeScore() {
  try { return JSON.parse(localStorage.getItem(KEY_LIFETIME_SCORE) || "0"); } catch { return 0; }
}
function loadLifetimeWords() {
  try { return JSON.parse(localStorage.getItem(KEY_LIFETIME_WORDS) || "[]"); } catch { return []; }
}
function updateLifetimeDisplay() {
  document.getElementById("lifetimeScore").textContent = loadLifetimeScore();
  document.getElementById("lifetimeWords").textContent = loadLifetimeWords().length;
}
function creditLifetime(word) {
  const words = loadLifetimeWords();
  if (words.includes(word)) return;
  words.push(word);
  localStorage.setItem(KEY_LIFETIME_WORDS, JSON.stringify(words));
  localStorage.setItem(KEY_LIFETIME_SCORE, JSON.stringify(loadLifetimeScore() + wordScore(word.length)));
  updateLifetimeDisplay();
}

// ── Render history ────────────────────────────────────────────────────────────
function renderHistory() {
  const wrong = loadHistory(KEY_WRONG);
  const right = loadHistory(KEY_RIGHT);
  historyPanel.style.display = (wrong.length || right.length) ? "block" : "none";

  wrongList.innerHTML = wrong.length
    ? wrong.map(w => `<button class="history-word" onclick="playTargetedWord('${w}')">${w}</button>`).join("")
    : `<div class="history-empty">none yet</div>`;

  rightList.innerHTML = right.length
    ? right.map(w => `<button class="history-word" onclick="playTargetedWord('${w}')">${w}</button>`).join("")
    : `<div class="history-empty">none yet</div>`;
}

// ── Targeted word ─────────────────────────────────────────────────────────────
function playTargetedWord(word) {
  // Interrupt if currently speaking
  if (isSpeaking) {
    window.speechSynthesis && window.speechSynthesis.cancel();
    isSpeaking = false;
    if (speakResolve) { speakResolve(); speakResolve = null; }
  }
  levelBeforeTarget = currentLevel;
  targetedWord = word;
  nextRound();
}

// ── Input / interrupt ─────────────────────────────────────────────────────────
spellingInput.addEventListener("input", () => {
  if (typingStartTime === null && spellingInput.value.length > 0) {
    typingStartTime = Date.now();
  }
});

spellingInput.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    if (!submitBtn.disabled) {
      checkSpelling();
    } else if (isSpeaking && spellingInput.value.trim()) {
      interruptAndCheck();
    }
  }
});

function interruptAndCheck() {
  window.speechSynthesis && window.speechSynthesis.cancel();
  isSpeaking = false;
  if (speakResolve) { speakResolve(); speakResolve = null; }
  submitBtn.disabled = false;
  spellingInput.disabled = false;
  checkSpelling();
}

// ── Pause ─────────────────────────────────────────────────────────────────────
function togglePause() {
  isPaused = !isPaused;
  if (isPaused) {
    pauseBtn.textContent = "▶ Resume";
    pauseBtn.classList.add("paused");
    if (isSpeaking) {
      window.speechSynthesis && window.speechSynthesis.pause();
    }
  } else {
    pauseBtn.textContent = "⏸ Pause";
    pauseBtn.classList.remove("paused");
    if (isSpeaking) {
      window.speechSynthesis && window.speechSynthesis.resume();
    }
    // If we were waiting between rounds (not speaking, not input active),
    // kick off the next round manually — handled by resumeAfterPause
  }
}

// ── Game flow ─────────────────────────────────────────────────────────────────
// Normalise a spelling for comparison: lowercase, strip spaces/hyphens/accents
function normalizeSpelling(s) {
  return s.toLowerCase()
    .replace(/[-\s]/g, '')
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '');
}

// Get display string from an entry (string or {display, alts} object)
function entryDisplay(entry) {
  return typeof entry === 'string' ? entry : entry.display;
}

// Get all accepted normalized spellings from an entry
function entryAlts(entry) {
  if (typeof entry === 'string') return [normalizeSpelling(entry)];
  return entry.alts.map(normalizeSpelling);
}

function pickWord(level) {
  const pool = WORD_LISTS[level].filter(e => entryDisplay(e) !== currentWord);
  const entry = pool[Math.floor(Math.random() * pool.length)];
  return entryDisplay(entry);
}

// Given a display string, find the entry object in any level
function findEntry(display) {
  for (const level of LEVEL_ORDER) {
    const e = WORD_LISTS[level].find(e => entryDisplay(e) === display);
    if (e !== undefined) return e;
  }
  return display; // fallback: treat as plain string
}

function changeLevel(wasCorrect) {
  if (gameMode !== 'champions') return; // only champions uses adaptive levels
  const idx = LEVEL_ORDER.indexOf(currentLevel);
  if (wasCorrect) {
    correctAtLevel++;
    if (correctAtLevel >= 2) {
      correctAtLevel = 0;
      currentLevel = LEVEL_ORDER[Math.min(idx + 1, LEVEL_ORDER.length - 1)];
    }
  } else {
    correctAtLevel = 0;
    currentLevel = LEVEL_ORDER[Math.max(idx - 1, 0)];
  }
}

async function startGame() {
  startBtn.disabled = true;

  if (gameMode === 'custom') {
    if (!customWords || customWords.length === 0) {
      alert("No custom word list loaded. Use the link generator to create one.");
      startBtn.disabled = false;
      return;
    }
    WORD_LISTS = { a: customWords, b: [], c: [], d: [] };
    updateWordCounts();
  } else if (gameMode === '5th') {
    WORD_LISTS = { a: FIFTH_GRADE_WORDS, b: [], c: [], d: [] };
    updateWordCounts();
  } else {
    startBtn.textContent = "Loading words...";
    try {
      const resp = await fetch(`${PROXY_BASE}/wordlists`);
      if (!resp.ok) throw new Error("Failed to load word lists");
      WORD_LISTS = await resp.json();
      updateWordCounts();
    } catch(e) {
      startBtn.disabled = false;
      startBtn.textContent = "Start Game 🍯";
      alert("Could not connect to the spelling bee server. Please try again.");
      return;
    }
  }

  // Lock mode tabs once game starts
  document.querySelectorAll('.mode-tab').forEach(b => b.disabled = true);

  startBtn.style.display = "none";
  pauseBtn.style.display = "block";
  roundBadge.style.display = "inline-block";
  currentLevel = "a";
  renderHistory();
  nextRound();
}

// ── API helpers (talk to secure backend endpoints) ───────────────────────────
const PROXY_BASE = "https://spebe.onrender.com";

async function wordApi(endpoint, word) {
  const response = await fetch(`${PROXY_BASE}/word/${endpoint}`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ word })
  });
  const data = await response.json();
  if (!response.ok) throw new Error(data.error || response.status);
  return data.text || "";
}

// ── Speed Run nextRound ───────────────────────────────────────────────────────
// roundId increments each round — async callbacks check if they're still current
let roundId = 0;

async function nextRound() {
  round++;
  roundNum.textContent = round;
  const myRoundId = ++roundId; // capture this round's ID

  if (targetedWord) {
    currentWord = targetedWord;
    targetedWord = null;
  } else {
    currentWord = pickWord(currentLevel);
  }

  resultBox.className = "result";
  resultBox.innerHTML = "";
  spellingInput.value = "";
  spellingInput.disabled = false;
  typingStartTime = null;
  submitBtn.disabled = true;
  spellingInput.placeholder = "start typing while I talk...";
  spellingInput.focus();
  repeatBtn.style.display = "none";

  // Helper: returns true if this round has been superseded (user submitted or new round started)
  const stale = () => roundId !== myRoundId;

  // Fixed speed sequence for word repetitions — varied but never too fast/slow
  // Reps: 0=first, 1=after first, 2&3=after definition, 4&5=after example
  const REP_RATES = [0.90, 0.70, 0.86, 0.73, 0.88, 0.68];

  const pw = primarySpelling(currentWord);
  const wordAnnouncement = pw + ".";
  lastSpokenText = wordAnnouncement;
  setStatus("", false);
  statusText.style.display = "none";
  spellingInput.disabled = true;
  submitBtn.disabled = true;

  // ── Step 1: Word × 2, unlock input after the first ───────────────────────
  await waitIfPaused();
  await speakWordRep(pw, 0, REP_RATES[0]);

  spellingInput.disabled = false;
  submitBtn.disabled = false;
  spellingInput.placeholder = "type your spelling...";
  spellingInput.focus();

  await new Promise(r => setTimeout(r, 900));
  if (!stale()) await speakWordRep(pw, 1, REP_RATES[1]);

  // ── Step 2: Definition ────────────────────────────────────────────────────
  if (stale()) return;
  setStatus("Getting definition...", false);
  let definitionText = "";
  try {
    definitionText = await wordApi("definition", currentWord);
  } catch(e) { /* silently skip if fails */ }

  if (stale()) return;
  if (definitionText) {
    lastSpokenText = wordAnnouncement + " " + definitionText;
    await waitIfPaused();
    await speakText(definitionText);
  }

  // ── Step 3: Word × 2 after definition ────────────────────────────────────
  if (stale()) return;
  await new Promise(r => setTimeout(r, 500));
  if (!stale()) await speakWordRep(pw, 2, REP_RATES[2]);
  await new Promise(r => setTimeout(r, 800));
  if (!stale()) await speakWordRep(pw, 3, REP_RATES[3]);

  // ── Step 4: Example sentence ──────────────────────────────────────────────
  if (stale()) return;
  setStatus("Getting example...", false);
  let exampleText = "";
  try {
    exampleText = await wordApi("example", currentWord);
  } catch(e) { /* silently skip if fails */ }

  if (stale()) return;
  if (exampleText) {
    lastSpokenText = wordAnnouncement + " " + definitionText + " " + exampleText;
    await waitIfPaused();
    await speakText(exampleText);
  }

  // ── Step 5: Word × 2 after example ───────────────────────────────────────
  if (stale()) return;
  await new Promise(r => setTimeout(r, 500));
  if (!stale()) await speakWordRep(pw, 4, REP_RATES[4]);
  await new Promise(r => setTimeout(r, 800));
  if (!stale()) await speakWordRep(pw, 5, REP_RATES[5]);

  // ── Final prompt ──────────────────────────────────────────────────────────
  if (stale()) return;
  lastSpokenText = wordAnnouncement + " " + definitionText + " " + exampleText + " Please spell: " + pw + ".";
  await waitIfPaused();
  await speakText(`Please spell: ${pw}.`);
  if (spellingInput.disabled) return;

  repeatBtn.style.display = "block";
  setStatus("Type your spelling above and press ✓ or Enter", false);
}

async function waitIfPaused() {
  if (!isPaused) return;
  setStatus("Paused — press Resume to continue", false);
  await new Promise(r => {
    const check = setInterval(() => { if (!isPaused) { clearInterval(check); r(); } }, 200);
  });
}

function setStatus(text, isVoice) {
  statusText.textContent = text;
  statusText.style.display = isVoice ? "none" : "block";
  voiceIndicator.className = "voice-indicator" + (isVoice ? " active" : "");
}

function getChosenVoice() {
  const voices = window.speechSynthesis.getVoices();
  const selectedName = document.getElementById("voiceSelect")?.value;
  let v = selectedName ? voices.find(v => v.name === selectedName) : null;
  if (!v) v = voices.find(v =>
    v.name.includes("Samantha") || v.name.includes("Karen") ||
    v.name.includes("Google US") || v.name.includes("en-US")
  );
  return v || null;
}

function getRate(override) {
  if (override !== undefined) return override;
  const slider = document.getElementById("rateSlider");
  return slider ? parseFloat(slider.value) : 0.9;
}

// Speak a superlative with snarky energy: pause, fast+high, pause
async function speakSuperlative(text) {
  await new Promise(r => setTimeout(r, 220)); // brief mic-drop lead-in silence
  await new Promise(resolve => {
    if (!window.speechSynthesis) { resolve(); return; }
    window.speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.rate  = Math.min(getRate() * 1.25, 1.4); // punchy — faster than normal
    utt.pitch = 1.35;                              // higher — ta-da energy
    const voice = getChosenVoice();
    if (voice) utt.voice = voice;
    utt.onend  = resolve;
    utt.onerror = resolve;
    window.speechSynthesis.speak(utt);
  });
  await new Promise(r => setTimeout(r, 350)); // mic drop silence after
}

// For alternate spelling entries like "marvelous / marvellous", return just the first
function primarySpelling(word) {
  return word.split('/')[0].trim();
}

function speakText(text, rateOverride) {
  return new Promise(resolve => {
    if (!window.speechSynthesis) { resolve(); return; }
    window.speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.rate = getRate(rateOverride);
    utt.pitch = 1.05;
    const voice = getChosenVoice();
    if (voice) utt.voice = voice;
    isSpeaking = true;
    speakResolve = resolve;
    lastSpokenText = text;
    setStatus("", true);
    utt.onend  = () => { isSpeaking = false; speakResolve = null; resolve(); };
    utt.onerror= () => { isSpeaking = false; speakResolve = null; resolve(); };
    window.speechSynthesis.speak(utt);
  });
}

// Speak a word twice: slider speed, longer pause, then slower
async function speakWordTwice(word) {
  await speakText(word + ".");
  await new Promise(r => setTimeout(r, 900));
  await speakText(word + ".", getRate() * 0.65);
}

// Returns the Nth English voice, cycling from the user's chosen voice
function getVoiceByOffset(offset) {
  const voices = window.speechSynthesis.getVoices().filter(v => v.lang.startsWith("en"));
  if (!voices.length) return null;
  const sel = document.getElementById("voiceSelect")?.value;
  const base = sel ? voices.findIndex(v => v.name === sel) : 0;
  return voices[((base >= 0 ? base : 0) + offset) % voices.length];
}

// Speak the word at a specific rep index (controls speed + voice rotation)
function speakWordRep(word, repIndex, rate) {
  return new Promise(resolve => {
    if (!window.speechSynthesis) { resolve(); return; }
    window.speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(word + ".");
    utt.rate = rate;
    utt.pitch = 1.05;
    const voice = getVoiceByOffset(repIndex);
    if (voice) utt.voice = voice;
    isSpeaking = true;
    speakResolve = resolve;
    setStatus("", true);
    utt.onend  = () => { isSpeaking = false; speakResolve = null; resolve(); };
    utt.onerror= () => { isSpeaking = false; speakResolve = null; resolve(); };
    window.speechSynthesis.speak(utt);
  });
}

function repeatWord() {
  if (isSpeaking) return;
  repeatBtn.style.display = "none";
  speakText(lastSpokenText).then(() => {
    repeatBtn.style.display = "block";
    setStatus("Type your spelling above and press ✓ or Enter", false);
  });
}

// ── Confetti burst on streak ──────────────────────────────────────────────────
function launchConfetti() {
  const canvas = document.createElement("canvas");
  canvas.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999";
  document.body.appendChild(canvas);
  const ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const colors = ["#ffd54f","#ffa726","#ff7043","#66bb6a","#42a5f5","#ab47bc","#ef5350","#26c6da"];
  const pieces = Array.from({length: 120}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * -canvas.height * 0.5,
    w: 8 + Math.random() * 8,
    h: 5 + Math.random() * 5,
    color: colors[Math.floor(Math.random() * colors.length)],
    angle: Math.random() * Math.PI * 2,
    spin: (Math.random() - 0.5) * 0.2,
    vx: (Math.random() - 0.5) * 4,
    vy: 2 + Math.random() * 4,
    alpha: 1,
  }));

  let frame;
  const tick = () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    for (const p of pieces) {
      p.x += p.vx; p.y += p.vy; p.angle += p.spin;
      if (p.y > canvas.height * 0.7) p.alpha -= 0.025;
      if (p.alpha > 0) alive = true;
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.alpha);
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    }
    if (alive) frame = requestAnimationFrame(tick);
    else canvas.remove();
  };
  frame = requestAnimationFrame(tick);
}

async function checkSpelling() {
  const guess = spellingInput.value.trim().toLowerCase();
  if (!guess || spellingInput.disabled) return;

  const wpm = calcWpm(guess, typingStartTime ? Date.now() - typingStartTime : null);
  typingStartTime = null;

  roundId++; // invalidate any in-flight definition/example fetches for this round
  spellingInput.disabled = true;
  submitBtn.disabled = true;
  total++;

  const entry = findEntry(currentWord);
  const normGuess = normalizeSpelling(guess);
  const isCorrect = entryAlts(entry).includes(normGuess);
  if (isCorrect) { correct++; streak++; creditLifetime(currentWord); } else { streak = 0; }

  document.getElementById("scoreCorrect").textContent = correct;
  document.getElementById("scoreTotal").textContent = total;

  // Record to history
  addToHistory(isCorrect ? KEY_RIGHT : KEY_WRONG, currentWord);
  renderHistory();

  const levelAtAnswer = currentLevel;

  // After a targeted round restore saved level; normal rounds adapt
  if (levelBeforeTarget !== null) {
    currentLevel = levelBeforeTarget;
    levelBeforeTarget = null;
  } else {
    changeLevel(isCorrect);
  }

  const levelClass    = "level-" + levelAtAnswer;
  const nextLevelLabel = LEVEL_LABELS[currentLevel];
  const wpmHtml = wpm ? `<span class="wpm-tag">⌨ ${wpm} WPM</span>` : "";

  if (isCorrect) {
    resultBox.className = "result correct";
    resultBox.innerHTML = `
      <span class="result-label">✅ Correct! Well done!</span>
      <span class="correct-word">${currentWord}</span>
      <span class="level-tag ${levelClass}">${LEVEL_LABELS[levelAtAnswer]}</span>
      <span style="display:block;font-size:0.85rem;margin-top:8px;opacity:0.7">Next up: ${nextLevelLabel}</span>
      ${wpmHtml}`;
    if (streak >= 3) launchConfetti();
    await speakText("Correct.");
    await speakSuperlative(randomSuperlative());
  } else {
    resultBox.className = "result wrong";
    resultBox.innerHTML = `
      <span class="result-label">❌ Not quite. The correct spelling is:</span>
      <span class="correct-word">${currentWord}</span>
      <span class="level-tag ${levelClass}">${LEVEL_LABELS[levelAtAnswer]}</span>
      <span style="display:block;font-size:0.85rem;margin-top:8px;opacity:0.7">Next up: ${nextLevelLabel}</span>
      ${wpmHtml}`;
    await speakText(`Not quite. The correct spelling is ${currentWord.split("").join(" ")}.`);
    await speakText(primarySpelling(currentWord) + ".");
  }

  setStatus("", false);
  statusText.style.display = "none";
  repeatBtn.style.display = "none";
  // Pause-aware delay before auto-advancing
  await new Promise(r => {
    let elapsed = 0;
    const tick = setInterval(() => {
      if (!isPaused) elapsed += 100;
      if (elapsed >= 1800) { clearInterval(tick); r(); }
    }, 100);
  });
  if (!isPaused) {
    nextRound();
  } else {
    // Wait for resume then go
    await new Promise(r => {
      const check = setInterval(() => {
        if (!isPaused) { clearInterval(check); r(); }
      }, 200);
    });
    nextRound();
  }
}

// ── Preload & populate voice selector ────────────────────────────────────────
function populateVoiceList() {
  const voices = window.speechSynthesis.getVoices();
  const sel = document.getElementById("voiceSelect");
  if (!sel || voices.length === 0) return;
  const current = sel.value;
  // Only show English voices
  const engVoices = voices.filter(v => v.lang.startsWith("en"));
  sel.innerHTML = '<option value="">Default voice</option>' +
    engVoices.map(v => `<option value="${v.name}"${v.name === current ? " selected" : ""}>${v.name} (${v.lang})</option>`).join("");
}

if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = populateVoiceList;
  populateVoiceList();
}

// Show any saved history on load
renderHistory();
updateLifetimeDisplay();

// Initialise mode (e.g. if arriving via a ?w= custom link)
setMode(gameMode);

// ── Typing speed ──────────────────────────────────────────────────────────────
// Standard WPM: (characters / 5) / minutes
function calcWpm(guess, elapsedMs) {
  if (!elapsedMs || elapsedMs <= 0) return null;
  const wpm = Math.round((guess.length / 5) / (elapsedMs / 60000));
  return wpm >= 10 ? wpm : null;
}

// ── Download / Upload progress ────────────────────────────────────────────────
function downloadProgress() {
  const data = {
    spellingbee_wrong:          loadHistory(KEY_WRONG),
    spellingbee_right:          loadHistory(KEY_RIGHT),
    spellingbee_lifetime_score: loadLifetimeScore(),
    spellingbee_lifetime_words: loadLifetimeWords(),
  };
  const payload = Object.assign({}, data, { sig: signPayload(data) });
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
  const a = Object.assign(document.createElement("a"), {
    href: URL.createObjectURL(blob),
    download: "spelling-bee-progress.json",
  });
  a.click();
  URL.revokeObjectURL(a.href);
}

function handleUpload(event) {
  const file = event.target.files[0];
  event.target.value = "";
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const payload = JSON.parse(e.target.result);
      const { sig, ...data } = payload;
      if (signPayload(data) !== sig) {
        alert("Signature mismatch — did someone tamper with the honey? 🍯");
        return;
      }
      if (Array.isArray(data.spellingbee_wrong))
        saveHistory(KEY_WRONG, data.spellingbee_wrong);
      if (Array.isArray(data.spellingbee_right))
        saveHistory(KEY_RIGHT, data.spellingbee_right);
      if (typeof data.spellingbee_lifetime_score === "number")
        localStorage.setItem(KEY_LIFETIME_SCORE, JSON.stringify(data.spellingbee_lifetime_score));
      if (Array.isArray(data.spellingbee_lifetime_words))
        localStorage.setItem(KEY_LIFETIME_WORDS, JSON.stringify(data.spellingbee_lifetime_words));
      renderHistory();
      updateLifetimeDisplay();
      alert("Progress restored! Welcome back, beekeeper. 🐝");
    } catch {
      alert("Could not read that file — make sure it's a valid spelling bee export.");
    }
  };
  reader.readAsText(file);
}

// Word counts (called after word lists load)
function updateWordCounts() {
  const counts = document.getElementById("wordCounts");
  if (!counts) return;
  const lines = LEVEL_ORDER.map(l => {
    const n = (WORD_LISTS[l] || []).length;
    return n > 0 ? `${LEVEL_LABELS[l]} Words: ${n}` : `${LEVEL_LABELS[l]} Words: —`;
  });
  counts.innerHTML = lines.join("<br>");
}
updateWordCounts();
